<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8 Billion Project — An atlas of everyone</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Brand + live counter -->
  <div class="brand">
    <div class="eyebrow">An atlas of everyone</div>
    <h1>8&nbsp;Billion <em>Project</em></h1>
    <div class="counter">
      <span class="num" id="count">0</span>
      <span class="of">of 8,000,000,000 photographed</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search" id="searchWrap">
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search a place…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="results" id="results"></div>
  </div>

  <!-- City panel -->
  <aside class="panel" id="panel">
    <div class="panel-head">
      <button class="panel-close" id="close" aria-label="Close">×</button>
      <div class="panel-coord" id="pCoord">—</div>
      <div class="panel-city" id="pCity">—</div>
      <div class="panel-country" id="pCountry">—</div>
      <div class="panel-meta">
        <div><b id="pCount">0</b>portraits</div>
        <div><b id="pSpan">—</b>birth years</div>
      </div>
    </div>
    <div class="panel-sub">In order of birth · oldest first</div>
    <div class="grid" id="grid"></div>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
